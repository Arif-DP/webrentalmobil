<!DOCTYPE html> 
<html lang="id"> 
    <head> <meta charset="UTF-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Login</title> 
    </head>
    <link rel="stylesheet" href="assets/css/login.css">
    <body>   

        <div class="container">
            <div class="login-box">
                <h2>Login</h2>

                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                
                <button onclick="login()">Sign in</button>

                <div class="links">
                    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
                </div>
                
                <p class="error" id="error"></p>
            </div>
        </div>

        <script>
            const userData = [
                { username: "admin", password: "123", role: "admin"},
            ];

            function login() {
                let user = document.getElementById("username").value;
                let pass = document.getElementById("password").value;
                let error = document.getElementById("error");

                if (user === "" || pass === "") {
                    error.innerHTML = "Username dan Password wajib diisi!";
                    return;
                }

                let found = userData.find(u => u.username === user && u.password === pass);

                if (found) {
                    localStorage.setItem("login", "true"); 
                    localStorage.setItem("role", found.role); 
                    localStorage.setItem("username", found.username);

                    alert("Login berhasil!");

                    window.location.href = "pages/dashboard_admin.html";
                    
                } else {
                    error.innerHTML = "Username atau Password salah!";

                }
            }

            document.addEventListener("keypress", function(e){
                if(e.key === "Enter"){
                    login();
                }
            });

            function forgotPassword() {
                alert("Fitur reset password belum tersedia 😁");
            }

            function daftar() {
                alert("Arahkan ke halaman register!");
                window.location.href = "register.html";
            }
        </script>
    </body>
</html>
