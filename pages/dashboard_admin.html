<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
</head>

<link rel="stylesheet" href="../assets/css/dashboard_admin.css">

<body>
    <div class="sidebar" id="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="dashboard_admin.html">Dashboard</a></li>
            <li><a href="data_mobil.html">Data Mobil</a></li>
            <li><a href="data_pelanggan.html">Data Pelanggan</a></li>
            <li><a href="transaksi_rental.html">Transaksi Rental</a></li>
            <li><a href="laporan.html">Laporan</a></li>
        </ul>
    </div>

    <div class="main" id="main">
        <div class="navbar">
            <div class="navbar-left">
                <button id="toggleBtn">☰</button>

                <img src="../assets/img/logo2.png" alt="Logo" class="logo">
                <h2 class="brand">Arif Car Rental</h2>
            </div>
            <div>
                <a href="../index.html">Logout</a>
            </div>
        </div>
        <div class="content">
            <h1 class="content-title">Ringkasan Statistik</h1>
            
            <div class="card-grid">
                <div class="card blue">
                    <div class="card-info">
                        <h4>Total Mobil</h4>
                        <p id="total-mobil">0</p>
                    </div>
                    <div class="card-icon">🚗</div>    
                </div>

                <div class="card green">
                    <div class="card-info">
                        <h4>Total Pelanggan</h4>
                        <p id="total-pelanggan">0</p>
                    </div>
                    <div class="card-icon">👥</div>
                </div>

                <div class="card orange">
                    <div class="card-info">
                        <h4>Mobil Disewa</h4>
                        <p id="mobil-disewa">0</p>
                    </div>
                    <div class="card-icon">🔑</div>
                </div>

                <div class="card red">
                    <div class="card-info">
                        <h4>Pendapatan Hari Ini</h4>
                        <p id="pendapatan">Rp 0</p>
                    </div>
                    <div class="card-icon">💰</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('toggleBtn').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
    });

    const DB = {
    get: function(key) {
            return JSON.parse(localStorage.getItem(key)) || [];
        },
        save: function(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }
    };

    function updateDashboard() {
        const mobil = DB.get('mobil') || [];
        const pelanggan = DB.get('pelanggan') || [];
        const transaksi = DB.get('transaksi') || [];
        const hariIni = new Date().toISOString().split('T')[0];

        const totalPendapatan = transaksi.reduce((sum, item) => {
            return sum + (parseInt(item.totalHarga) ||0 );
        }, 0);

        const pendapatanHariIni = transaksi
            .filter(item => item.tanggal === hariIni)
            .reduce((sum, item) => sum + (parseInt(item.totalHarga) || 0), 0);

        document.getElementById('total-mobil').innerText = mobil.length;
        document.getElementById('total-pelanggan').innerText = pelanggan.length;
        document.getElementById('mobil-disewa').innerText = transaksi.length;
        
        document.getElementById('pendapatan').innerText = 
            "Rp " + totalPendapatan.toLocaleString('id-ID');
    }
        window.onload = updateDashboard;
    </script>
</body>
</html>
