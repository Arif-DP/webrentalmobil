<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi Rental</title>
</head>

<link rel="stylesheet" href="../assets/css/dashboard_admin.css">

<body>
    <div class="sidebar" id="sidebar">
        <h2>Menu</h2>
        <ul>
            <li><a href="dashboard_admin.html">Dashboard</a></li>
            <li><a href="data_mobil.html">Data Mobil</a></li>
            <li><a href="data_pelanggan.html">Data Pelanggan</a></li>
            <li><a href="transaksi_rental.html">Transaksi Rental</a></li>
            <li><a href="laporan.html">Laporan</a></li>
        </ul>
    </div>

    <div class="main" id="main">
        <div class="navbar">
            <div class="navbar-left">
                <button id="toggleBtn">☰</button>

                <img src="../assets/img/logo2.png" alt="Logo" class="logo">
                <h2 class="brand">Arif Car Rental</h2>
            </div>
            <div>
                <a href="../index.html">Logout</a>
            </div>
        </div>

        <div class="content">
            <h3>Input Transaksi Baru</h3>
            <div class="form-container">
                <select id="selectPelanggan">
                    <option value="">-- Pilih Pelanggan --</option>
                </select>
    
                <select id="selectMobil">
                    <option value="">-- Pilih Mobil --</option>
                </select>

                <input type="number" id="durasi" placeholder="Durasi (Hari)">
                <button onclick="tambahTransaksi()">Simpan Transaksi</button>
            </div>

            <table id="tabelTransaksi">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Pelanggan</th>
                        <th>Mobil</th>
                        <th>Durasi</th>
                        <th>Harga</th>
                        <th>Edit</th>
                        <th>Hapus</th>
                    </tr>
                </thead>
                <tbody id="bodyTransaksi"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('toggleBtn').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });

        const DB = {
            get: function(key) {
                return JSON.parse(localStorage.getItem(key)) || [];
            },
            save: function(key, data) {
                localStorage.setItem(key, JSON.stringify(data));
            }
        };

        renderTransaksi();

        let editIndex = -1;

        function loadOptions() {
            const dataMobil = DB.get('mobil') || [];
            const dataPelanggan = DB.get('pelanggan') || [];

            const selectMobil = document.getElementById('selectMobil');
            const selectPelanggan = document.getElementById('selectPelanggan');

            selectMobil.innerHTML = `<option value="">-- Pilih Mobil --</option>`;
            selectPelanggan.innerHTML = `<option value="">-- Pilih Pelanggan --</option>`;

            dataMobil.forEach(m => {
                selectMobil.innerHTML += `<option value="${m.merk}" data-harga="${m.harga}" data-model="${m.model}">
                    ${m.model} (${m.plat})</option>`;
            });

            dataPelanggan.forEach(p => {
                selectPelanggan.innerHTML += `<option value="${p.nama}">${p.nama}</option>`;
            });
        }

        loadOptions();

        function renderTransaksi() {
            const tbody = document.getElementById('bodyTransaksi');
            const data = DB.get('transaksi') || [];
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.tanggal}</td> 
                        <td>${item.pelanggan}</td>
                        <td>${item.mobil} ${item.model}</td>
                        <td>${item.durasi} Hari</td>
                        <td>Rp ${parseInt(item.totalHarga).toLocaleString('id-ID')}</td>
                        <td><button onclick="editTransaksi(${index})">Edit</button></td>
                        <td><button onclick="hapusTransaksi(${index})">Hapus</button></td>
                    </tr>
                `;
            });
        }

        function tambahTransaksi() {
            const selectMobil = document.getElementById('selectMobil');
            const pelanggan = document.getElementById('selectPelanggan').value;
            const mobil = selectMobil.value;

            const model = selectMobil.options[selectMobil.selectedIndex].getAttribute('data-model');
            const durasi = document.getElementById('durasi').value;

            const hargaPerHari = selectMobil.options[selectMobil.selectedIndex].getAttribute('data-harga');
            const tanggal = new Date().toISOString().split('T')[0];

            if(pelanggan && mobil && durasi && hargaPerHari) {
                let data = DB.get('transaksi') || [];

                const totalHarga = parseInt(durasi) * parseInt(hargaPerHari);

                const newData = {
                    tanggal,
                    pelanggan,
                    mobil,
                    model,
                    durasi,
                    totalHarga
                };

                if (editIndex === -1) {
                    data.push(newData);
                    
                } else {
                    data[editIndex] = newData;
                    editIndex = -1;

                    document.querySelector("button[onclick='tambahTransaksi()']").innerText = "Simpan Transaksi";
                }
                
                DB.save('transaksi', data);
                renderTransaksi();

                document.getElementById('durasi').value = '';
            } else {
                alert("Mohon lengkapi data transaksi!");
            }
        }

        function editTransaksi(index) {
            const data = DB.get('transaksi') || [];
            const t = data[index];

            document.getElementById('selectPelanggan').value = t.pelanggan;
            document.getElementById('selectMobil').value = t.mobil;
            document.getElementById('durasi').value = t.durasi;

            editIndex = index;

            document.querySelector("button[onclick='tambahTransaksi()']").innerText = "Update Transaksi";
        }

        function hapusTransaksi(index) {
            let data = DB.get('transaksi') || [];

            data.splice(index, 1);

            DB.save('transaksi', data);
            renderTransaksi();
        }

    </script>
</body>
</html>
